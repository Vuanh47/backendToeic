<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OAuth2 Login Test</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; max-width: 900px; }
    .row { margin-bottom: 12px; }
    button { margin-right: 8px; padding: 8px 12px; cursor: pointer; }
    pre { background: #f6f8fa; padding: 12px; border-radius: 6px; overflow: auto; }
    .hint { color: #555; }
  </style>
</head>
<body>
<h2>OAuth2 Test Page (Google / GitHub)</h2>
<div class="row">
  <a href="/api/oauth2/authorization/google"><button>Login with Google</button></a>
  <a href="/api/oauth2/authorization/github"><button>Login with GitHub</button></a>
  <button id="btnMe">Get Current User</button>
  <button id="btnLogout">Logout</button>
</div>
<p class="hint">If your app uses context-path <code>/api</code>, this page is available at <code>/api/oauth2-test.html</code>.</p>
<pre id="output">Click "Get Current User" after login...</pre>

<script>
  const output = document.getElementById('output');

  document.getElementById('btnMe').addEventListener('click', async () => {
    try {
      const res = await fetch('/api/oauth2/me', { credentials: 'include' });
      const data = await res.json();
      output.textContent = JSON.stringify(data, null, 2);
    } catch (e) {
      output.textContent = 'Error: ' + e;
    }
  });

  document.getElementById('btnLogout').addEventListener('click', async () => {
    try {
      await fetch('/api/logout', { method: 'POST', credentials: 'include' });
    } catch (e) {
      // ignore and hard-redirect anyway
    }
    window.location.href = '/api/oauth2-test.html';
  });
</script>
</body>
</html>
